services:
  mongodb:
    image: mongo:7
    container_name: paris-metro-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: paris-metro-backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DB_NAME=paris_metro_map
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: paris-metro-frontend
    ports:
      - "5500:5500"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
